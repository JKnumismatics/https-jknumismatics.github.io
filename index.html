<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JK Numismatics</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 0 25px rgba(212, 175, 55, 0.15);
    }

    h1 {
      margin-bottom: 10px;
      font-size: 32px;
      color: #d4af37; /* gold */
      letter-spacing: 1px;
    }

    p {
      margin: 10px 0;
      color: #ccc;
    }

    .description {
      margin-top: 20px;
      font-size: 15px;
    }

    .contact {
      margin-top: 25px;
      font-size: 16px;
    }

    a {
      color: #d4af37;
      text-decoration: none;
      border-bottom: 1px solid transparent;
    }

    a:hover {
      border-bottom: 1px solid #d4af37;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>JK Numismatics</h1>

    <p>Coins • Currency • Collectibles</p>

    <div class="description">
      <p>
        Specializing in buying, selling, and evaluating collectible coins and numismatic items.
      </p>
      <p>
        Honest pricing, knowledgeable service, and a passion for the hobby.
      </p>
    </div>

    <div class="contact">
      <p>
        <strong>Contact:</strong><br>
        <a href="mailto:jknumismatics@gmail.com">jknumismatics@gmail.com</a>
      </p>
    </div>

    <div class="footer">
      <p>Serving collectors nationwide</p>
    </div>
  </div>
</body>
</html>
